name: Test clauditable

on:
  push:
    branches:
      - test/clauditable

jobs:
  test:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: research/AI-evo1/clauditable

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Run tests
        run: make test
